<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Hearth & Page</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #1a1a18; color: #ccc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #232320; border: 1px solid #333; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 420px; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-text { color: #4a9ba8; font-size: 1.1rem; font-weight: 600; }
  h1 { font-size: 1.4rem; font-weight: 600; color: #e8e4de; margin-bottom: 8px; }
  p { font-size: 0.9rem; color: #888; margin-bottom: 24px; }
  label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; margin-top: 16px; }
  input { width: 100%; background: #2d2d2a; border: 1px solid #444; border-radius: 8px; padding: 12px 14px; color: #e8e4de; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #4a9ba8; }
  button { width: 100%; margin-top: 24px; background: #1B4150; color: white; border: none; border-radius: 8px; padding: 13px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #2a5f72; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg { margin-top: 16px; padding: 12px 14px; border-radius: 8px; font-size: 0.88rem; display: none; }
  .msg.error { background: #3a1a1a; border: 1px solid #6b2a2a; color: #e08080; display: block; }
  .msg.success { background: #1a2e1a; border: 1px solid #2a5a2a; color: #80c080; display: block; }
  .back { display: block; text-align: center; margin-top: 20px; color: #4a9ba8; font-size: 0.85rem; text-decoration: none; }
  .back:hover { text-decoration: underline; }
  #request-form, #reset-form { }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 4C20 4 8 12 8 22C8 28.627 13.373 34 20 34C26.627 34 32 28.627 32 22C32 12 20 4 20 4Z" fill="#4a9ba8" opacity="0.8"/>
      <path d="M20 14C20 14 14 18 14 23C14 26.314 16.686 29 20 29C23.314 29 26 26.314 26 23C26 18 20 14 20 14Z" fill="#1B4150"/>
    </svg>
    <span class="logo-text">Hearth & Page</span>
  </div>

  <!-- Request reset form -->
  <div id="request-form">
    <h1>Forgot your password?</h1>
    <p>Enter your email and we'll send you a reset link.</p>
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    <button id="request-btn" onclick="requestReset()">Send reset link</button>
    <div id="request-msg" class="msg"></div>
    <a href="https://hearthandpage.ca/#/login" class="back">Back to sign in</a>
  </div>

  <!-- New password form -->
  <div id="reset-form" class="hidden">
    <h1>Set new password</h1>
    <p>Choose a strong password for your account.</p>
    <label for="password">New password</label>
    <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
    <label for="confirm">Confirm password</label>
    <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password">
    <button id="reset-btn" onclick="doReset()">Update password</button>
    <div id="reset-msg" class="msg"></div>
  </div>
</div>

<script>
const API = 'https://api-production-2334.up.railway.app';

// Read token from all possible locations
function getToken() {
  // From query string: /forgot?token=xxx
  const qs = new URLSearchParams(window.location.search);
  if (qs.get('token')) return qs.get('token');
  // From hash query: /#/forgot?token=xxx
  const hash = window.location.hash;
  const hi = hash.indexOf('?');
  if (hi >= 0) {
    const hqs = new URLSearchParams(hash.slice(hi + 1));
    if (hqs.get('token')) return hqs.get('token');
  }
  return null;
}

const token = getToken();
const step = new URLSearchParams(window.location.search).get('step') ||
  (window.location.hash.includes('step=reset') ? 'reset' : null);

// Show reset form if token present
if (token && step === 'reset') {
  document.getElementById('request-form').classList.add('hidden');
  document.getElementById('reset-form').classList.remove('hidden');
}

async function requestReset() {
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('request-btn');
  const msg = document.getElementById('request-msg');
  msg.className = 'msg';
  if (!email) { msg.className = 'msg error'; msg.textContent = 'Please enter your email address.'; return; }
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    const r = await fetch(API + '/api/auth/forgot', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email })
    });
    msg.className = 'msg success';
    msg.textContent = 'Check your inbox — a reset link is on its way.';
    btn.textContent = 'Sent!';
  } catch(e) {
    msg.className = 'msg error';
    msg.textContent = 'Something went wrong. Please try again.';
    btn.disabled = false; btn.textContent = 'Send reset link';
  }
}

async function doReset() {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const btn = document.getElementById('reset-btn');
  const msg = document.getElementById('reset-msg');
  msg.className = 'msg';
  if (password.length < 8) { msg.className = 'msg error'; msg.textContent = 'Password must be at least 8 characters.'; return; }
  if (password !== confirm) { msg.className = 'msg error'; msg.textContent = 'Passwords do not match.'; return; }
  btn.disabled = true; btn.textContent = 'Updating...';
  try {
    const r = await fetch(API + '/api/auth/reset', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ token, password })
    });
    const data = await r.json();
    if (r.ok) {
      msg.className = 'msg success';
      msg.textContent = 'Password updated! Redirecting you to sign in...';
      setTimeout(() => { window.location.href = 'https://hearthandpage.ca/#/login'; }, 2000);
    } else {
      msg.className = 'msg error';
      msg.textContent = data.message || 'Reset failed. The link may have expired — request a new one.';
      btn.disabled = false; btn.textContent = 'Update password';
    }
  } catch(e) {
    msg.className = 'msg error';
    msg.textContent = 'Connection error. Please try again.';
    btn.disabled = false; btn.textContent = 'Update password';
  }
}
</script>
</body>
</html>

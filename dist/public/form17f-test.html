<!doctype html>
<html>
<head>
  <title>Form 17F Test</title>
  <link rel="stylesheet" href="./assets/index-BC6OZlWN.css">
  <style>
    body { font-family: sans-serif; background: #f5f5f0; padding: 20px; }
    #form-container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; }
  </style>
</head>
<body>
  <div id="form-container">
    <h1>Form 17F Test — Confirmation of Conference</h1>
    <div id="hp-form-root"></div>
  </div>
  <script src="./assets/hp-patches.js" defer></script>
  <script src="./assets/FormEngine.js" defer></script>
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var container = document.getElementById('hp-form-root');
        if (window.__hp_FormEngine && window.__hp_FormEngine.render) {
          window.__hp_FormEngine.render('ON-F17F', container, { 
            caseId: 10, 
            apiToken: null,
            apiBase: '',
          });
        } else {
          container.innerHTML = '<p>FormEngine not loaded. Available: ' + JSON.stringify(Object.keys(window).filter(k => k.includes('hp'))) + '</p>';
        }
      }, 500);
    });
  </script>
</body>
</html>

[phases.setup]
pkgs = ["nodejs_20", "python311", "poppler_utils"]

[phases.build]
cmds = ["npm install --production", "cp fill_pdf.py dist/fill_pdf.py || true", "which python3 > dist/python3_path.txt && echo OK || true"]

[start]
cmd = "NODE_ENV=production node dist/index.cjs"

[variables]
PORT = "8080"

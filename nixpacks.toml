[phases.setup]
pkgs = ["nodejs_20", "python311", "python311Packages.pypdf"]

[phases.build]
cmds = ["npm install --production", "cp fill_pdf.py dist/fill_pdf.py || true", "which python3 > dist/python3_path.txt && echo OK || true"]

[start]
cmd = "PATH=$PATH:/nix/var/nix/profiles/default/bin NODE_ENV=production node dist/index.cjs"
